# Learn how to configure Hyprland: https://wiki.hypr.land/Configuring/

# Use defaults Omarchy defaults (but don't edit these directly!)
source = ~/.local/share/omarchy/default/hypr/autostart.conf
source = ~/.local/share/omarchy/default/hypr/bindings/media.conf
source = ~/.local/share/omarchy/default/hypr/bindings/clipboard.conf
source = ~/.local/share/omarchy/default/hypr/bindings/tiling-v2.conf
source = ~/.local/share/omarchy/default/hypr/bindings/utilities.conf
source = ~/.local/share/omarchy/default/hypr/envs.conf
source = ~/.local/share/omarchy/default/hypr/looknfeel.conf
source = ~/.local/share/omarchy/default/hypr/input.conf
source = ~/.local/share/omarchy/default/hypr/windows.conf
source = ~/.config/omarchy/current/theme/hyprland.conf

# Change your own setup in these files (and overwrite any settings from defaults!)
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/autostart.conf

# Toggle config flags dynamically
source = ~/.local/state/omarchy/toggles/hypr/*.conf

# Add any other personal Hyprland configuration below
# windowrule = workspace 5, match:class qemu

# DISABLED - AFK tool no longer used.
# Original rules left commented for reference.
# AFK streaming screen: big ASCII "AFK, I will be right back"
# Set-sized floating pop-up terminal that always appears in the center of the screen
# (pinned on top) and "pops out" of the window system. The stream sees your full
# code/desktop underneath; the AFK message is in its own fixed window on top.
# Kitty handles large font + bg opacity; Hyprland forces float + fixed size + explicit
# centered move (for "always center") + pin.
# Note: if you change the size below, also update the numbers in the move rule.
# Launched via SUPER+SHIFT+Z or by running "afk"
#windowrule = float on, match:class ^org\.omarchy\.afk$
#windowrule = size 900 480, match:class ^org\.omarchy\.afk$
#windowrule = move (monitor_w - 900)/2 (monitor_h - 480)/2 , match:class ^org\.omarchy\.afk$
#windowrule = pin on, match:class ^org\.omarchy\.afk$
#windowrule = border_size 0, match:class ^org\.omarchy\.afk$
#windowrule = animation none, match:class ^org\.omarchy\.afk$
#windowrule = opacity 0.85 0.85, match:class ^org\.omarchy\.afk$
#windowrule = tag -default-opacity, match:class ^org\.omarchy\.afk$
#windowrule = idle_inhibit always, match:class ^org\.omarchy\.afk$
